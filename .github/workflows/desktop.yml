name: Build desktop apps

# Build Mac (.dmg/.zip) and Windows (.exe) installers.
# Run manually from the Actions tab, or push a tag like v1.0.0.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # allow electron-builder to create/upload GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # On a version tag: publish to GitHub Releases (creates the auto-update
      # feed: latest.yml / latest-mac.yml + installers). Otherwise just build.
      - name: Package & publish
        run: npx electron-builder ${{ matrix.target }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers (build artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: void-raider-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.yml
          if-no-files-found: ignore
