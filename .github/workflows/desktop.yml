name: Build & release desktop apps

# Build Mac (.dmg/.zip) and Windows (.exe) installers.
# Run manually from the Actions tab (build only), or push a tag like v1.0.0
# to build AND publish a single GitHub Release (the auto-update feed).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # build installers only — do NOT publish here (avoids parallel-publish races)
      - run: npx electron-builder ${{ matrix.target }} --publish never
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build output
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      # Publish ONE release containing both platforms' installers plus the
      # update feeds (latest.yml for Windows, latest-mac.yml for macOS).
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "VOID RAIDER ${{ github.ref_name }} — auto-built release. The desktop app updates to this automatically."
