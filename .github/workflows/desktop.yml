name: Build desktop apps

# Build Mac (.dmg/.zip) and Windows (.exe) installers.
# Run manually from the Actions tab, or push a tag like v1.0.0.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package
        run: npx electron-builder ${{ matrix.target }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: void-raider-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
          if-no-files-found: ignore
